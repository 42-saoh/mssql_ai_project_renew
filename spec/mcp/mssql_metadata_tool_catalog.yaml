version: 0.1.0
service: externalMssqlMetadata
implementationOwner: external-standalone-mssql-mcp
baseUrlEnv: PLF_METADATA_GATEWAY_URL
defaultLocalBaseUrl: http://localhost:8100
readOnly: true
runtimeDiscoveryOnly: true
unknownToolsBlockedByPlatform: true

description: >
  PLF DB Agent V2 does not implement or package the MSSQL MCP service.
  The platform connects to an externally running standalone MSSQL metadata
  MCP REST boundary and discovers its active tools at runtime.

endpoints:
  readiness:
    method: GET
    path: /health/ready
  toolCatalog:
    method: GET
    path: /catalog/tools
  dbProfiles:
    method: GET
    path: /config/db-profiles
  invokeTool:
    method: POST
    pathTemplate: /tools/{toolName}/invoke
    request:
      type: object
      required: [arguments]
      properties:
        arguments:
          type: object

metadataSearchMapping:
  platformEndpoint: /api/v1/metadata/search
  externalToolName: search_metadata_objects
  argumentMapping:
    q: query
    dbProfileId: dbProfileId
    limit: limit
  limits:
    min: 1
    max: 100

allowedMetadataToolNames:
  - search_metadata_objects
  - describe_object
  - find_references
  - get_table_schema
  - get_table_columns
  - get_table_indexes
  - get_table_relationships
  - get_object_dependencies
  - get_procedure_metadata
  - get_procedure_definition
  - get_procedure_dependencies

catalogPolicy:
  requireReadOnlyFlag: true
  filterBlockedToolsBeforeReturningToPlatform: true
  filterUnknownToolsBeforeReturningToPlatform: true
  sanitizeCatalogBeforeUnsafeResponseValidation: true
  invokeUnknownToolsAllowed: false

blockedBeforeProxy:
  exactToolNames:
    - execute_sql
    - execute_procedure
    - query_row_data
    - apply_ddl
    - apply_dml
    - deploy_source
    - create_object
    - alter_object
    - drop_object
    - truncate_table
    - insert_row
    - update_row
    - delete_row
    - merge_rows
    - backup_database
    - restore_database
    - grant_permission
    - revoke_permission
  namePrefixes:
    - execute_
    - apply_
    - deploy_
    - create_
    - alter_
    - drop_
    - truncate_
    - insert_
    - update_
    - delete_
    - merge_
    - backup_
    - restore_
    - grant_
    - revoke_
  nameFragments:
    - row_data
    - free_sql
    - ddl_apply
    - dml_apply
    - procedure_execution
    - source_apply
  argumentPolicy:
    - no raw prompt
    - no raw provider response
    - no raw stored procedure definition
    - no row data
    - no secrets
    - no free SQL execution
    - no DDL/DML apply

responsePolicy:
  failClosedOnUnsafeResponse: true
  successEnvelopeRequiresRequestedToolName: true
  safeDiagnosticsOnly: true
  noRowData: true
  noSecrets: true
  noRawPromptOrProviderPayloads: true
  noRawStoredProcedureDefinitions: true
  rawStoredProcedureDefinitionShapesBlocked:
    - create_or_alter_procedure_scripts
    - procedure_definition_body_script_fields
    - body_only_module_fragments
  noConnectionStringsInSafeDiagnostics: true
  noCredentialsInSafeDiagnostics: true
  safeDiagnosticsSanitizedAtSerialization: true
  connectionStringShapesBlockedInDiagnostics:
    - ado_net_key_value_strings
    - jdbc_sqlserver_urls
    - sqlalchemy_mssql_urls

responseEnvelope:
  success:
    required: [ok, toolName]
    properties:
      ok: { type: boolean }
      toolName: { type: string }
      dbProfileId: { type: string }
      snapshotId: { type: string }
      collectedAt: { type: string }
      evidenceRefs:
        type: array
        items: { type: object }
      data: { type: object }
  error:
    required: [ok, error]
    properties:
      ok: { const: false }
      error:
        type: object
        required: [code, message]
        properties:
          code: { type: string }
          message: { type: string }
          details:
            type: object
            description: Safe diagnostics only; never SQL text, connection strings, credentials, row data, or procedure execution output.
