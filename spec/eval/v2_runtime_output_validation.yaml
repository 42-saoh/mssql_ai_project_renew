version: 0.1.0
suite: v2_runtime_output_validation
scope: g08-runtime-skills-output-schemas-validators

cases:
  - id: g08_runtime_skills_declare_run_scope_schema_and_artifact_types
    summary: Runtime skills must declare service-only scope, run type, output schema, and proposal artifact types.
    expected: pass
  - id: g08_requested_output_schema_mismatch_returns_blocked_result
    summary: A result that passes the generic runner schema but violates the requested runtime schema must return a BLOCKED result with no proposals.
    expected: pass
  - id: g08_static_and_redaction_validators_block_unsafe_outputs
    summary: Policy, static, and redaction validators must block unsafe previews, executable instructions, raw prompts, row data, secrets, and missing review markers.
    expected: pass
  - id: g08_executable_apply_deploy_procedure_instructions_are_blocked
    summary: Runtime output policy must block run/apply DDL or DML, migration apply, source overwrite/apply, deploy, and stored-procedure execution wording before proposals can be returned or persisted.
    expected: pass
    blockedExamples:
      - Run this DDL against the business database.
      - Apply the supplied DML script.
      - Apply the following migration.
      - Execute this update statement.
      - Overwrite source files with this mapper.
      - Apply these source changes to the project.
      - Deploy this service.
      - Roll out these changes.
      - Invoke stored procedure dbo.ApplyInvoiceAudit.
      - Call stored procedure dbo.ApplyInvoiceAudit.
      - Run dbo.ApplyInvoiceAudit.
