name: v2_blocked_request_paths
summary: Forbidden requests are blocked or approval-required without execution.
status: scaffold
cases:
  - id: g00_apply_or_deploy_requests_blocked
    summary: Requests to apply DDL/DML, execute procedures, apply source, or deploy must be blocked without artifact persistence.
  - id: g00_stored_procedure_execution_phrases_blocked_before_side_effects
    summary: Run/call/exec stored-procedure requests in English and Korean, including Korean object-particle forms, must hard-block before metadata gateway, runner submission, artifact persistence, or approval side effects.
  - id: g02_blocked_paths_do_not_create_artifacts
    summary: Blocked requests must return a policy decision and must not create codex runs or persisted artifacts.
  - id: g03_blocked_api_requests_do_not_submit_runner_or_artifacts
    summary: FastAPI blocked request handling must not submit Service Codex Runner work or persist artifacts.
  - id: g06_blocked_metadata_gateway_requests_do_not_proxy
    summary: Metadata Gateway blocks unsafe tool names, arguments, and search queries before the external MSSQL MCP transport is called.
  - id: g11_blocked_requests_emit_safe_observability_without_side_effects
    summary: Blocked requests may emit sanitized observability events but must not create approvals, runner submissions, artifacts, DB execution, source apply, or deploy side effects.
  - id: g11_raw_payload_secret_connection_requests_block_before_side_effects
    summary: DB-analysis-shaped requests containing raw prompt/provider markers, secrets, or SQL Server connection strings must hard-block before PGPT, Metadata Gateway, Codex Runner, approval, artifact, validation, DB execution, source apply, or deploy side effects.
