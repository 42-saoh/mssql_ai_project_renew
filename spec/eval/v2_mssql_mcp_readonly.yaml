name: v2_mssql_mcp_readonly
summary: MSSQL MCP must expose only read-only metadata tools.
status: scaffold
cases:
  - id: g00_no_row_data_or_sp_execution_tools
    summary: MSSQL MCP tool access must block row-data queries, free SQL, stored procedure execution, DDL/DML apply, source apply, and deploy.
  - id: g02_metadata_tool_catalog_readonly_contract
    summary: Metadata tool catalog must distinguish read-only evidence tools from blocked execution or mutation tools.
  - id: g06_metadata_gateway_filters_runtime_catalog_to_readonly_allowlist
    summary: Platform metadata tool catalog returns only allowlisted external tools that explicitly declare readOnly true.
  - id: g06_blocked_mcp_tools_and_unsafe_payloads_do_not_reach_transport
    summary: Blocked, unknown, execution, mutation, row-data, raw-payload, and secret MCP requests must fail before external transport.
  - id: g06_unsafe_mcp_responses_fail_closed
    summary: External MCP responses containing row data, secrets, connection strings, raw payloads, raw stored procedure definitions, or mismatched tool envelopes must fail closed with safe diagnostics only.
