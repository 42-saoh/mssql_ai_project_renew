version: 0.1.0
service: streamlitInternalUiShell
scope: g04-streamlit-internal-ui-shell

objective: Implement Chat, History, Artifact Detail, and Admin/Eval UI through FastAPI only.

uiShell:
  entrypoint: apps/streamlit/app.py
  designSource: DESIGN.md
  themeConfigPath: .streamlit/config.toml
  cssPath: styles/design.css
  layout: wide
  initialSidebarState: expanded
  pages:
    chat:
      path: apps/streamlit/pages/01_Chat.py
      apiClientMethods:
        - create_chat_run
      visibleStates:
        - DRAFT
        - MANUAL REVIEW REQUIRED
        - BLOCKED
        - FAILED
    history:
      path: apps/streamlit/pages/02_History.py
      apiClientMethods:
        - get_conversation
        - list_artifacts
      visibleStates:
        - SANITIZED ONLY
        - DRAFT
        - VALIDATED
        - BLOCKED
        - FAILED
    artifactDetail:
      path: apps/streamlit/pages/03_Artifact_Detail.py
      apiClientMethods:
        - list_artifacts
        - get_artifact
      visibleStates:
        - DRAFT
        - MANUAL REVIEW REQUIRED
        - VALIDATED
        - BLOCKED
        - FAILED
    adminEval:
      path: apps/streamlit/pages/04_Admin_Eval.py
      apiClientMethods:
        - get_health
        - metadata_ready
        - list_metadata_tools
      visibleStates:
        - DEV ONLY
        - VALIDATED
        - BLOCKED
        - FAILED

apiBoundary:
  streamlitMayCall: FastAPI only
  allowedClient: apps.streamlit.client.api_client.ApiClient
  clientPath: apps/streamlit/client/api_client.py
  endpoints:
    createChatRun: /api/v1/chat-runs
    getChatRun: /api/v1/chat-runs/{chatRunId}
    getConversation: /api/v1/conversations/{conversationId}
    listArtifacts: /api/v1/artifacts
    getArtifact: /api/v1/artifacts/{artifactId}
    health: /health
    metadataReady: /api/v1/metadata/ready
    metadataTools: /api/v1/metadata/tools
  forbiddenDirectCalls:
    - DB
    - MSSQL MCP
    - Metadata Gateway
    - Service Codex Runner
  forbiddenPorts:
    - "8010"
    - "8100"

artifactReviewPolicy:
  productionReadyDisplayedAsAllowed: false
  requiredReviewStates:
    - DRAFT
    - MANUAL REVIEW REQUIRED
    - VALIDATED
    - BLOCKED
    - FAILED
  forbiddenUnsafeLabels:
    - Execute SQL
    - Apply DDL
    - Deploy
    - Run stored procedure
    - Auto-fix database
    - Overwrite source

nonGoals:
  backendPersistenceCompletion: G10
  langGraphMvpCompletion: G05
  mssqlMcpGatewayCompletion: G06
  serviceRunnerCompletion: G07

acceptanceEvidence:
  focusedTests:
    - tests/contract/test_g04_streamlit_internal_ui_shell.py
    - tests/contract/test_streamlit_design_contract.py
    - tests/security/test_streamlit_design_boundary.py
    - tests/unit/test_streamlit_api_client.py
